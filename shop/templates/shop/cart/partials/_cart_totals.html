<dl class="totals">
  <div><dt>Subtotal</dt><dd>${{ totals.subtotal }}</dd></div>
  {% if totals.discount_total %}<div><dt>Discount{% if totals.discount_label %} · {{ totals.discount_label }}{% endif %}</dt><dd>-${{ totals.discount_total }}</dd></div>{% endif %}
  <div><dt>Shipping</dt><dd>${{ totals.shipping_total }}</dd></div>
  <div><dt>Tax</dt><dd>${{ totals.tax_total }}</dd></div>
  <div class="total"><dt>Total</dt><dd>${{ totals.total }}</dd></div>
</dl>
