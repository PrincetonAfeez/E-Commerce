services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: commerce
      POSTGRES_USER: commerce
      POSTGRES_PASSWORD: commerce
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U commerce"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build: .
    # Entrypoint runs migrations; CMD (gunicorn) is inherited from the image.
    environment:
      DJANGO_ENV: production
      DJANGO_DEBUG: "0"
      DJANGO_SECRET_KEY: docker-compose-dev-secret-change-me
      DJANGO_ALLOWED_HOSTS: localhost,127.0.0.1,web
      DJANGO_SECURE_SSL_REDIRECT: "0"
      DATABASE_URL: postgres://commerce:commerce@db:5432/commerce
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
